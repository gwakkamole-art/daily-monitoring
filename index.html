<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해커스 타사 모니터링 비서 - 멀티 채널 ver.</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2b6bf3; --bg-color: #f0f4f8; --card-bg: #ffffff; --text-color: #333; --border-radius: 16px; --shadow: 0 4px 24px rgba(0, 0, 0, 0.06); }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 40px 20px; color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 1100px; display: flex; gap: 25px; align-items: flex-start; }
        .card { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); padding: 25px; }
        
        /* 왼쪽 사이드바: 그룹 관리 */
        .sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        .group-item { background: #fff; border: 1px solid #dfe3e8; border-radius: 8px; padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; margin-bottom: 5px; }
        .group-item:hover { border-color: var(--primary-color); background: #f8faff; }
        .group-item.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .delete-btn { color: #ff6b6b; cursor: pointer; padding: 5px; }
        .group-item.active .delete-btn { color: #fff; }

        /* 메인 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .header-section { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f1f3f5; padding-bottom: 15px; }
        .app-title { font-size: 24px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .api-section { background-color: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #e9ecef; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input, textarea { flex: 1; padding: 10px; border: 1px solid #dfe3e8; border-radius: 8px; font-size: 14px; }
        .btn { padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; border: 1px solid #dfe3e8; transition: 0.2s; }
        .btn-primary { background: var(--primary-color); color: white; border: none; width: 100%; height: 50px; font-size: 16px; }
        
        #resultArea { margin-top: 20px; }
        .result-box { width: 100%; height: 400px; padding: 15px; background: #f8faff; border: 1px solid #dbeafe; border-radius: 12px; font-size: 13px; line-height: 1.6; font-family: 'Consolas', monospace; }
        .loading { display: none; text-align: center; margin: 15px 0; font-weight: bold; color: var(--primary-color); }
        
        /* 모달 */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:25px; border-radius:16px; width:450px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar card">
        <span style="font-weight: 800; font-size: 15px; margin-bottom: 10px; display: block;">📂 담당 채널 그룹</span>
        <div id="groupList"></div>
        <button class="btn" style="width: 100%; margin-top: 10px; font-size: 13px;" onclick="openAddGroupModal()">+ 새 그룹 추가</button>
    </div>

    <div class="main-content card">
        <div class="header-section">
            <div class="app-title"><i class="fa-brands fa-youtube" style="color:#ff0000;"></i> 해커스 타사 모니터링 비서</div>
        </div>

        <div class="api-section">
            <label style="font-size: 12px; font-weight: bold; color: #666;">🔑 YouTube API Key</label>
            <div class="input-group">
                <input type="password" id="userApiKey" placeholder="API Key를 입력하세요">
                <button class="btn" onclick="saveApiKey()">저장</button>
            </div>
            
            <label style="font-size: 12px; font-weight: bold; color: #666; margin-top: 10px; display: block;">📍 현재 선택된 그룹의 타사 채널 ID</label>
            <textarea id="currentChannels" style="width: 100%; height: 60px; margin-top: 5px;" placeholder="왼쪽에서 그룹을 선택하거나 직접 입력하세요 (쉼표 구분)"></textarea>
            
            <button onclick="fetchData()" id="fetchBtn" class="btn btn-primary" style="margin-top: 15px;">🚀 데이터 취합 시작</button>
        </div>

        <div id="loading" class="loading"><i class="fa-solid fa-spinner fa-spin"></i> 분석 중... 잠시만 기다려주세요, 박사님!</div>

        <div id="resultArea" style="display: none;">
            <textarea id="outputText" class="result-box"></textarea>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top: 0;">새 채널 그룹 추가</h3>
        <input type="text" id="newGroupName" placeholder="그룹명 (예: 일본어팀)" style="width: 100%; margin-bottom: 10px;">
        <textarea id="newGroupIds" placeholder="타사 채널 ID 리스트 (쉼표 구분)" style="width: 100%; height: 100px; margin-bottom: 15px;"></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex: 1;" onclick="saveNewGroup()">저장하기</button>
            <button class="btn" style="flex: 1;" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
    let groups = JSON.parse(localStorage.getItem('hackers_yt_groups')) || {};
    let activeGroup = null;

    window.onload = () => {
        document.getElementById('userApiKey').value = localStorage.getItem('hackers_yt_apikey') || '';
        renderGroups();
    };

    function renderGroups() {
        const list = document.getElementById('groupList');
        list.innerHTML = '';
        Object.keys(groups).forEach(name => {
            const div = document.createElement('div');
            div.className = `group-item ${activeGroup === name ? 'active' : ''}`;
            div.onclick = () => selectGroup(name);
            div.innerHTML = `<span>${name}</span><i class="fa-solid fa-trash delete-btn" onclick="deleteGroup(event, '${name}')"></i>`;
            list.appendChild(div);
        });
    }

    function selectGroup(name) {
        activeGroup = name;
        document.getElementById('currentChannels').value = groups[name];
        renderGroups();
    }

    function saveApiKey() {
        const key = document.getElementById('userApiKey').value.trim();
        localStorage.setItem('hackers_yt_apikey', key);
        alert("API 키가 저장되었습니다.");
    }

    function openAddGroupModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('addModal').style.display = 'none'; }

    function saveNewGroup() {
        const name = document.getElementById('newGroupName').value.trim();
        const ids = document.getElementById('newGroupIds').value.trim();
        if(!name || !ids) return alert("이름과 ID를 모두 입력해주세요.");
        groups[name] = ids;
        localStorage.setItem('hackers_yt_groups', JSON.stringify(groups));
        closeModal();
        renderGroups();
    }

    function deleteGroup(e, name) {
        e.stopPropagation();
        if(confirm(`[${name}] 그룹을 삭제하시겠습니까?`)) {
            delete groups[name];
            localStorage.setItem('hackers_yt_groups', JSON.stringify(groups));
            if(activeGroup === name) activeGroup = null;
            renderGroups();
        }
    }

    async function fetchData() {
        const apiKey = document.getElementById('userApiKey').value.trim();
        const channels = document.getElementById('currentChannels').value.split(',').map(c => c.trim()).filter(c => c);
        if(!apiKey || channels.length === 0) return alert("API 키와 채널 정보를 확인해주세요.");

        const btn = document.getElementById('fetchBtn');
        const loading = document.getElementById('loading');
        const output = document.getElementById('outputText');
        
        btn.disabled = true;
        loading.style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        let report = "";
        const now = new Date();
        let lookback = (now.getDay() === 1) ? 3 : 1;
        const start = new Date();
        start.setDate(now.getDate() - lookback);
        const startTime = new Date(start.setHours(12, 0, 0, 0)).toISOString();
        const endTime = new Date(new Date().setHours(0, 0, 0, 0)).toISOString();

        try {
            for(let id of channels) {
                const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?key=${apiKey}&id=${id}&part=snippet`);
                const chData = await chRes.json();
                const chName = chData.items[0].snippet.title;
                report += `\n   @ ${chName}\n`;

                const vRes = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${id}&part=snippet,id&order=date&publishedAfter=${startTime}&publishedBefore=${endTime}&maxResults=5&type=video`);
                const vData = await vRes.json();

                if(vData.items && vData.items.length > 0) {
                    for(let i=0; i<vData.items.length; i++) {
                        const vid = vData.items[i].id.videoId;
                        const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${apiKey}&id=${vid}&part=statistics,contentDetails`);
                        const dData = await dRes.json();
                        const views = Number(dData.items[0].statistics.viewCount).toLocaleString();
                        const dur = dData.items[0].contentDetails.duration.replace('PT','').replace('M',':').replace('S','');
                        report += `${i+1}. ${vData.items[i].snippet.title} - ${dur}\n   https://youtu.be/${vid}\n   신규 영상 조회수 ${views}회\n   ㄴ [특이사항 없음]\n\n`;
                    }
                } else { report += `   ㄴ 신규 영상 없음\n\n`; }
            }
            output.value = report.trim();
            document.getElementById('resultArea').style.display = 'block';
        } catch(e) { alert("오류 발생! API 키와 ID를 확인하세요."); }
        finally { btn.disabled = false; loading.style.display = 'none'; }
    }
</script>
</body>
</html>
